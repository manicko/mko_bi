version: "3.9"

services:
  app:
    build: .
    container_name: bi_app
    volumes:
      - ./data:/data
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    container_name: bi_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app